<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Free Demo - Popup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Demo Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-container" data-name="Pop up" data-node-id="3957:558">
            <!-- Background decorative element -->
            <div class="popup-decoration" data-node-id="3959:1043"></div>
            
            <!-- Main content -->
            <div class="popup-content">
                <!-- Left section: Text and buttons -->
                <div class="popup-left">
                    <p class="popup-heading" data-node-id="3959:1048">
                        <span>Curious to know how? </span>
                        <span class="highlight-text">Book your free demo</span>
                        <span> with our product experts</span>
                    </p>
                    
                    <div class="popup-buttons" data-node-id="3960:1049">
                        <button class="btn-primary" data-name="Buttons/Button" data-node-id="3960:1051">
                            <span class="btn-text" data-node-id="3960:1054">BOOK MY DEMO</span>
                        </button>
                        <button class="btn-secondary" data-name="Buttons/Button" data-node-id="3960:1057">
                            <span class="btn-text" data-node-id="3960:1060">CALL ME BACK</span>
                        </button>
                    </div>
                </div>
                
                <!-- Right section: Image -->
                <div class="popup-right" data-name="customer support 1" data-node-id="3965:1072">
                    <img src="http://localhost:3845/assets/274fe61281873e02d762e0db3adde49ef239c7bd.png" 
                         alt="Customer Support" 
                         class="customer-support-image"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="image-placeholder" style="display: none;">
                        <svg width="254" height="287" viewBox="0 0 254 287" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="254" height="287" fill="#E0E0E0"/>
                            <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#999" font-family="Arial" font-size="14">Customer Support Image</text>
                        </svg>
                    </div>
                </div>
            </div>
            
            <!-- Close button -->
            <button class="popup-close" id="closePopup" aria-label="Close popup">×</button>
        </div>
    </div>

    <!-- Trigger button (for demo purposes) -->
    <button class="trigger-button" id="triggerPopup">Show Demo Popup</button>

    <script src="script.js"></script>
</body>
</html>
