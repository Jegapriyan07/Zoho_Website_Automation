<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Landing Page — Zoho Analytics</title>
    <link rel="stylesheet" href="../../source/zohocustom.css">
    <link rel="stylesheet" href="../../source/product.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">

        <header class="header-section">
            <div class="content-wrap">
                <a href="/" class="header-logo-link">
                    <img src="images/zoho-logo.png" alt="Zoho Analytics" class="header-logo">
                </a>
            </div>
        </header>

        <section class="banner-section">
            <div class="banner-bg-watermark">
                <img src="images/zoho-watermark.png" alt="" aria-hidden="true">
            </div>
            <div class="banner-noise" aria-hidden="true"></div>
            <div class="banner-decorative-lines" aria-hidden="true">
                <img src="images/decorative-lines.svg" alt="">
            </div>

            <div class="content-wrap banner-inner">
                <div class="banner-content">
                    <h1 class="banner-title">Penny for your thoughts?</h1>
                    <p class="banner-subtitle">
                        Literally, share your experience and claim <span class="gradient-text">$25 gift card!!</span>
                    </p>
                </div>

                <div class="banner-illustration" aria-hidden="true">
                    <img src="images/vector-line.svg" alt="" class="illus-curve-line">

                    <div class="illus-emoji-group-left">
                        <img src="images/ellipse9.svg" alt="" class="emoji-ring">
                    </div>

                    <div class="illus-emoji-group-right">
                        <img src="images/ellipse10.svg" alt="" class="emoji-ring-medium">
                        <img src="images/ellipse11.svg" alt="" class="emoji-ring-large">
                    </div>

                    <div class="illus-woman1">
                        <img src="images/woman1.png" alt="Person with laptop">
                    </div>

                    <div class="illus-chat-bubble">
                        <img src="images/chat-bubble.svg" alt="">
                    </div>

                    <div class="illus-review-chart">
                        <img src="images/banner-illustration.svg" alt="">
                    </div>

                    <div class="illus-review-group">
                        <img src="images/review-group.svg" alt="">
                    </div>

                    <div class="illus-man1">
                        <img src="images/man1.png" alt="Person sitting">
                    </div>

                    <div class="illus-spotify">
                        <img src="images/spotify.svg" alt="">
                    </div>

                    <div class="illus-github">
                        <img src="images/github.svg" alt="">
                    </div>

                    <div class="illus-g2-icon">
                        <img src="images/g2-layer.svg" alt="">
                    </div>

                    <div class="illus-star-badge">
                        <div class="star-badge-inner">
                            <svg class="star-icon" viewBox="0 0 24 24" fill="#FFB800"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="#FFB800"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="#FFB800"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="#FFB800"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="#FFB800"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                        </div>
                    </div>

                    <div class="illus-woman2">
                        <img src="images/woman2.png" alt="Person celebrating">
                    </div>
                </div>
            </div>
        </section>

        <section class="review-platform-section">
            <div class="bg-gradient" aria-hidden="true">
                <img src="images/bg.svg" alt="">
            </div>

            <div class="content-wrap">
                <h2 class="section-heading">Choose your preferred review platform</h2>

                <div class="platform-category">
                    <h3 class="category-title">Product Directories</h3>
                    <div class="platform-cards">
                        <a href="#" class="platform-card">
                            <img src="images/gartner.svg" alt="Gartner" class="card-logo gartner-logo">
                        </a>
                        <a href="#" class="platform-card card-highlight">
                            <div class="capterra-logo-wrap">
                                <img src="images/capterra-icon.svg" alt="" class="capterra-icon">
                                <img src="images/capterra-text.svg" alt="Capterra" class="capterra-text">
                            </div>
                        </a>
                        <a href="#" class="platform-card">
                            <img src="images/g2-large.svg" alt="G2" class="card-logo g2-logo">
                        </a>
                        <a href="#" class="platform-card">
                            <img src="images/trustradius.svg" alt="TrustRadius" class="card-logo trustradius-logo">
                        </a>
                    </div>
                </div>

                <div class="platform-category">
                    <h3 class="category-title">Marketplace</h3>
                    <div class="platform-cards">
                        <a href="#" class="platform-card">
                            <img src="images/quickbooks.svg" alt="Intuit QuickBooks" class="card-logo quickbooks-logo">
                        </a>
                        <a href="#" class="platform-card">
                            <img src="images/ms-appsource.png" alt="Microsoft AppSource" class="card-logo appsource-logo">
                        </a>
                        <a href="#" class="platform-card">
                            <img src="images/zendesk.svg" alt="Zendesk" class="card-logo zendesk-logo">
                        </a>
                        <a href="#" class="platform-card">
                            <img src="images/hubspot.svg" alt="HubSpot" class="card-logo hubspot-logo">
                        </a>
                    </div>
                    <div class="platform-cards">
                        <a href="#" class="platform-card marketplace-single">
                            <img src="images/google-workspace.svg" alt="Google Workspace" class="card-logo gworkspace-logo">
                        </a>
                    </div>
                </div>
            </div>
        </section>

    </div>
</body>
</html>
